<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>009 Merch — Admin</title>
<style>
  :root { --bg:#0b0b0c; --panel:#151517; --line:#2a2a2e; --muted:#8a8a90; --fg:#f2f2f3; --yellow:#ebcc00; --danger:#e2564d; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.45 -apple-system,Segoe UI,Roboto,sans-serif; }
  a { color:inherit; }
  button { font:inherit; cursor:pointer; }
  .hidden { display:none !important; }
  /* login */
  .login { min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login form { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:28px; width:320px; }
  .login h1 { margin:0 0 4px; font-size:20px; letter-spacing:.04em; }
  .login p { margin:0 0 18px; color:var(--muted); font-size:12px; }
  input, select, textarea { width:100%; background:#0e0e10; border:1px solid var(--line); color:var(--fg); border-radius:8px; padding:9px 11px; margin-top:6px; }
  textarea { min-height:80px; resize:vertical; }
  label { display:block; font-size:12px; color:var(--muted); margin-top:12px; }
  .btn { background:var(--yellow); color:#000; border:0; border-radius:8px; padding:10px 16px; font-weight:600; letter-spacing:.02em; }
  .btn--ghost { background:transparent; color:var(--fg); border:1px solid var(--line); }
  .btn--danger { background:transparent; color:var(--danger); border:1px solid #4a2b2b; }
  .btn--sm { padding:5px 10px; font-size:12px; }
  .err { color:var(--danger); font-size:12px; margin-top:10px; min-height:16px; }
  /* shell */
  header.bar { display:flex; align-items:center; gap:20px; padding:0 20px; height:56px; border-bottom:1px solid var(--line); background:var(--panel); position:sticky; top:0; z-index:10; }
  header.bar b { letter-spacing:.06em; }
  .tabs { display:flex; gap:6px; margin-left:12px; }
  .tabs button { background:transparent; border:0; color:var(--muted); padding:8px 12px; border-radius:7px; }
  .tabs button.active { color:#000; background:var(--yellow); font-weight:600; }
  .bar .spacer { flex:1; }
  main { max-width:1000px; margin:0 auto; padding:22px 20px 80px; }
  .row-actions { display:flex; gap:8px; }
  h2.section { font-size:15px; letter-spacing:.04em; margin:4px 0 14px; display:flex; align-items:center; gap:12px; }
  .hint { color:var(--muted); font-size:12px; font-weight:400; }
  /* product list */
  .plist { display:flex; flex-direction:column; gap:8px; }
  .pcard { display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
  .pcard.dragging { opacity:.4; }
  .pcard.over { border-color:var(--yellow); }
  .grip { cursor:grab; color:var(--muted); font-size:18px; padding:0 4px; user-select:none; }
  .thumb { width:52px; height:52px; border-radius:8px; object-fit:cover; background:#000; flex:0 0 auto; }
  .pcard .meta { flex:1; min-width:0; }
  .pcard .meta b { display:block; }
  .pcard .meta span { color:var(--muted); font-size:12px; }
  .pill { font-size:11px; padding:2px 8px; border-radius:20px; border:1px solid var(--line); color:var(--muted); }
  .pill.on { color:var(--yellow); border-color:#4a4426; }
  /* editor modal */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; justify-content:center; align-items:flex-start; padding:40px 16px; overflow:auto; z-index:50; }
  .modal { background:var(--panel); border:1px solid var(--line); border-radius:12px; width:560px; max-width:100%; padding:22px; }
  .modal h3 { margin:0 0 12px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .sizes { display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }
  .sizes label { display:inline-flex; align-items:center; gap:5px; margin:0; color:var(--fg); border:1px solid var(--line); padding:6px 10px; border-radius:7px; }
  .sizes input { width:auto; margin:0; }
  .imgs { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
  .imgcell { position:relative; width:74px; height:74px; border:1px solid var(--line); border-radius:8px; overflow:hidden; cursor:grab; }
  .imgcell.over { border-color:var(--yellow); }
  .imgcell img { width:100%; height:100%; object-fit:cover; }
  .imgcell button { position:absolute; top:2px; right:2px; background:rgba(0,0,0,.7); color:#fff; border:0; border-radius:6px; width:20px; height:20px; line-height:1; }
  .modal .foot { display:flex; justify-content:space-between; margin-top:20px; }
  /* orders */
  .otable { width:100%; border-collapse:collapse; }
  .otable th, .otable td { text-align:left; padding:10px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:top; }
  .otable th { color:var(--muted); font-weight:500; }
  .status { padding:4px 8px; border-radius:6px; }
  .muted { color:var(--muted); }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--yellow); color:#000; padding:10px 18px; border-radius:8px; font-weight:600; z-index:100; opacity:0; transition:opacity .2s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script type="module">
import PocketBase from "https://esm.sh/pocketbase@0.26.2";

const PB_URL = "https://009-merch-backend-production.up.railway.app";
const pb = new PocketBase(PB_URL);
pb.autoCancellation(false);

const CATEGORIES = ["hoodies","t-shirts","shorts","shirts","accessories","denim"];
const SIZES = ["S","M","L","XL","XXL"];
const STATUSES = ["pending","paid","processing","shipped","done","cancelled"];

const $ = (s, r=document) => r.querySelector(s);
const app = $("#app");
const esc = (s) => String(s??"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fileUrl = (rec, name) => `${PB_URL}/api/files/${rec.collectionId}/${rec.id}/${name}`;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }

let TAB = "products";

/* ---------------- login ---------------- */
function renderLogin(errMsg=""){
  app.innerHTML = `
  <div class="login"><form id="loginForm">
    <h1>009 · Admin</h1><p>Sign in to manage the store</p>
    <label>Email<input id="email" type="email" autocomplete="username" required></label>
    <label>Password<input id="pass" type="password" autocomplete="current-password" required></label>
    <div class="err">${esc(errMsg)}</div>
    <button class="btn" style="width:100%;margin-top:14px" type="submit">Sign in</button>
  </form></div>`;
  $("#loginForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    try {
      await pb.collection("_superusers").authWithPassword($("#email").value.trim(), $("#pass").value);
      renderApp();
    } catch(err){ renderLogin("Wrong email or password"); }
  });
}

/* ---------------- shell ---------------- */
function renderApp(){
  app.innerHTML = `
  <header class="bar">
    <b>009 · ADMIN</b>
    <div class="tabs">
      <button data-tab="products" class="${TAB==="products"?"active":""}">Products</button>
      <button data-tab="orders" class="${TAB==="orders"?"active":""}">Orders</button>
    </div>
    <div class="spacer"></div>
    <button class="btn btn--ghost btn--sm" id="logout">Log out</button>
  </header>
  <main id="view"></main>`;
  app.querySelectorAll(".tabs button").forEach(b => b.addEventListener("click", ()=>{ TAB=b.dataset.tab; renderApp(); }));
  $("#logout").addEventListener("click", ()=>{ pb.authStore.clear(); renderLogin(); });
  if (TAB==="products") renderProducts(); else renderOrders();
}

/* ---------------- products ---------------- */
async function renderProducts(){
  const view = $("#view");
  view.innerHTML = `<h2 class="section">Products <span class="hint">— drag to reorder</span>
     <div class="spacer" style="flex:1"></div><button class="btn btn--sm" id="addP">+ Add product</button></h2>
     <div class="plist" id="plist">Loading…</div>`;
  $("#addP").addEventListener("click", ()=> openEditor(null));
  const items = await pb.collection("products").getFullList({ sort:"sort" });
  const imgs = await pb.collection("product_images").getFullList({ sort:"sort" });
  const firstImg = {};
  for (const im of imgs) if (im.image && !firstImg[im.product]) firstImg[im.product] = fileUrl(im, im.image);
  const list = $("#plist");
  list.innerHTML = items.map(p => `
    <div class="pcard" draggable="true" data-id="${p.id}">
      <span class="grip">⠿</span>
      <img class="thumb" src="${firstImg[p.id]||""}" alt="">
      <div class="meta"><b>${esc(p.name)}</b><span>${esc(p.subtitle)} · ${esc(p.category)} · $${p.price}</span></div>
      <span class="pill ${p.active?"on":""}">${p.active?"active":"hidden"}</span>
      <div class="row-actions"><button class="btn btn--ghost btn--sm edit">Edit</button></div>
    </div>`).join("") || `<p class="muted">No products yet.</p>`;
  list.querySelectorAll(".edit").forEach((b,i)=> b.addEventListener("click", ()=> openEditor(items[i])));
  enableRowDrag(list, async (orderedIds)=>{
    await Promise.all(orderedIds.map((id,idx)=> pb.collection("products").update(id, { sort: idx+1 })));
    toast("Order saved");
  });
}

/* generic native drag-reorder for direct children carrying data-id */
function enableRowDrag(container, onDrop, itemSel="[data-id]"){
  let dragEl=null;
  container.querySelectorAll(itemSel).forEach(el=>{
    el.addEventListener("dragstart", ()=>{ dragEl=el; el.classList.add("dragging"); });
    el.addEventListener("dragend", ()=>{ el.classList.remove("dragging"); container.querySelectorAll(itemSel).forEach(x=>x.classList.remove("over")); });
    el.addEventListener("dragover", (e)=>{ e.preventDefault(); if(el!==dragEl) el.classList.add("over"); });
    el.addEventListener("dragleave", ()=> el.classList.remove("over"));
    el.addEventListener("drop", (e)=>{
      e.preventDefault(); el.classList.remove("over");
      if(!dragEl||dragEl===el) return;
      const items=[...container.querySelectorAll(itemSel)];
      const from=items.indexOf(dragEl), to=items.indexOf(el);
      if(from<to) el.after(dragEl); else el.before(dragEl);
      onDrop([...container.querySelectorAll(itemSel)].map(x=>x.dataset.id));
    });
  });
}

/* ---------------- product editor ---------------- */
async function openEditor(product){
  const isNew = !product;
  let images = [];
  if (!isNew) images = await pb.collection("product_images").getFullList({ filter:`product="${product.id}"`, sort:"sort" });
  const sizes = (product?.sizes)||["S","M","L","XL"];
  const ov = document.createElement("div"); ov.className="overlay";
  ov.innerHTML = `<div class="modal">
    <h3>${isNew?"New product":"Edit product"}</h3>
    <div class="grid2">
      <div><label>Name<input id="f_name" value="${esc(product?.name||"")}"></label></div>
      <div><label>Subtitle<input id="f_sub" value="${esc(product?.subtitle||"")}"></label></div>
      <div><label>Price<input id="f_price" type="number" value="${product?.price??""}"></label></div>
      <div><label>Old price<input id="f_old" type="number" value="${product?.old_price??""}"></label></div>
      <div><label>Category<select id="f_cat">${CATEGORIES.map(c=>`<option ${product?.category===c?"selected":""}>${c}</option>`).join("")}</select></div>
      <div><label>Active<select id="f_active"><option value="true" ${product?.active!==false?"selected":""}>Yes</option><option value="false" ${product?.active===false?"selected":""}>No</option></select></label></div>
    </div>
    <label>Sizes</label><div class="sizes">${SIZES.map(s=>`<label><input type="checkbox" value="${s}" ${sizes.includes(s)?"checked":""}>${s}</label>`).join("")}</div>
    <label>Description<textarea id="f_desc">${esc(product?.description||"")}</textarea></label>
    <label>Photos ${isNew?'<span class="hint">— save product first, then add photos</span>':'<span class="hint">— drag to reorder</span>'}</label>
    <div class="imgs" id="imgs">${images.map(im=>`
      <div class="imgcell" draggable="true" data-id="${im.id}"><img src="${fileUrl(im,im.image)}"><button data-del="${im.id}">×</button></div>`).join("")}</div>
    ${isNew?"":'<input type="file" id="upl" accept="image/*" multiple style="margin-top:10px">'}
    <div class="foot">
      ${isNew?"<span></span>":'<button class="btn btn--danger btn--sm" id="delP">Delete product</button>'}
      <div class="row-actions"><button class="btn btn--ghost" id="cancel">Cancel</button><button class="btn" id="save">Save</button></div>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.addEventListener("mousedown", e=>{ if(e.target===ov) close(); });
  $("#cancel",ov).addEventListener("click", close);

  $("#save",ov).addEventListener("click", async ()=>{
    const data = {
      name:$("#f_name",ov).value.trim(), subtitle:$("#f_sub",ov).value.trim(),
      price:Number($("#f_price",ov).value)||0, old_price:Number($("#f_old",ov).value)||null,
      category:$("#f_cat",ov).value, active:$("#f_active",ov).value==="true",
      description:$("#f_desc",ov).value,
      sizes:[...ov.querySelectorAll(".sizes input:checked")].map(i=>i.value),
    };
    try {
      if(isNew){ const cnt=(await pb.collection("products").getList(1,1)).totalItems; data.sort=cnt+1; await pb.collection("products").create(data); }
      else await pb.collection("products").update(product.id, data);
      close(); toast("Saved"); renderProducts();
    } catch(err){ alert("Save failed: "+(err?.message||err)); }
  });

  if(!isNew){
    $("#delP",ov).addEventListener("click", async ()=>{
      if(!confirm("Delete this product and its photos?")) return;
      await pb.collection("products").delete(product.id); close(); toast("Deleted"); renderProducts();
    });
    const imgWrap=$("#imgs",ov);
    imgWrap.querySelectorAll("[data-del]").forEach(b=> b.addEventListener("click", async ()=>{
      await pb.collection("product_images").delete(b.dataset.del); b.closest(".imgcell").remove(); toast("Photo removed");
    }));
    enableRowDrag(imgWrap, async (ids)=>{ await Promise.all(ids.map((id,idx)=> pb.collection("product_images").update(id,{sort:idx+1}))); toast("Photo order saved"); }, ".imgcell");
    $("#upl",ov).addEventListener("change", async (e)=>{
      const files=[...e.target.files]; const base=(await pb.collection("product_images").getList(1,1,{filter:`product="${product.id}"`})).totalItems;
      for(let i=0;i<files.length;i++){ const fd=new FormData(); fd.append("product",product.id); fd.append("sort",base+i+1); fd.append("image",files[i]); await pb.collection("product_images").create(fd); }
      toast("Photos uploaded"); openEditor(await pb.collection("products").getOne(product.id)); close();
    });
  }
}

/* ---------------- orders ---------------- */
async function renderOrders(){
  const view=$("#view");
  view.innerHTML = `<h2 class="section">Orders</h2><div id="otable">Loading…</div>`;
  const orders = await pb.collection("orders").getFullList({ sort:"-created" });
  $("#otable").innerHTML = orders.length ? `<table class="otable">
    <thead><tr><th>#</th><th>Items</th><th>Total</th><th>Customer</th><th>Status</th><th>Date</th></tr></thead>
    <tbody>${orders.map(o=>{
      const items=(Array.isArray(o.items)?o.items:[]).map(it=>`${esc(it.name||it.product||"item")} ${it.size?"("+esc(it.size)+")":""} ×${it.qty||it.quantity||1}`).join("<br>");
      const cust=o.customer&&typeof o.customer==="object"?Object.values(o.customer).filter(Boolean).join(", "):"";
      return `<tr>
        <td><b>${esc(o.order_no||o.id.slice(0,6))}</b></td>
        <td>${items||'<span class="muted">—</span>'}</td>
        <td>${o.total?esc(o.currency||"$")+" "+o.total:'<span class="muted">—</span>'}</td>
        <td>${esc(cust)||'<span class="muted">—</span>'}</td>
        <td><select class="status" data-id="${o.id}">${STATUSES.map(s=>`<option ${o.status===s?"selected":""}>${s}</option>`).join("")}</select></td>
        <td class="muted">${new Date(o.created).toLocaleString()}</td>
      </tr>`;}).join("")}</tbody></table>`
    : `<p class="muted">No orders yet.</p>`;
  $("#otable").querySelectorAll(".status").forEach(sel=> sel.addEventListener("change", async ()=>{
    await pb.collection("orders").update(sel.dataset.id,{status:sel.value}); toast("Status updated");
  }));
}

/* ---------------- boot ---------------- */
if (pb.authStore.isValid && pb.authStore.record) renderApp(); else renderLogin();
</script>
</body>
</html>
